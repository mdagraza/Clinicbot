{% extends "panel.html" %}
{% load static %}

{% block contenido %}

<div id="datos-cuenta" class="content-section active">
    <h2 class="section-title">Datos de la Cuenta</h2>

    <div class="form-container">
        <form id="account-form" method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="usuario" class="form-label">Nombre de usuario</label>
                <input type="text" id="usuario" name="usuario" class="form-input" disabled value="{{ datos.username }}"
                    tabindex="1">
            </div>

            <div class="form-group">
                <label for="nombre" class="form-label">Nombre completo</label>
                <input type="text" id="nombre" name="nombre" class="form-input" required
                    value="{{ datos.nombre_completo }}" tabindex="2">
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Correo electrónico</label>
                <input type="email" id="email" name="email" class="form-input" required value="{{ datos.email }}"
                    tabindex="3">
            </div>

            <button type="submit" class="btn btn-primary" tabindex="4">Actualizar Datos</button>
        </form>

        <!-- Sección para cambiar contraseña -->
        <div class="password-section">
            <h3>Cambiar Contraseña</h3>
            <form id="password-form" method="post" action="{% url 'cambiar_contrasena' %}">
                {% csrf_token %}

                <div class="form-group">
                    <label for="current-password" class="form-label">Contraseña actual</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="current-password" name="current_password" class="form-input" required
                            placeholder="··········" tabindex="5">
                        <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
                            <!-- Icono de ojo cerrado (visible por defecto) -->
                            <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke-width="1.5" stroke="currentColor">
                                <g fill="none" fill-rule="evenodd" stroke="currentColor" stroke-linecap="round"
                                    stroke-linejoin="round" transform="translate(2 10)">
                                    <path
                                        d="m0 .5c2.53705308 3.66666667 5.37038642 5.5 8.5 5.5 3.1296136 0 5.9629469-1.83333333 8.5-5.5" />
                                    <path d="m2.5 3.423-2 2.077" />
                                    <path d="m14.5 3.423 2 2.077" />
                                    <path d="m10.5 6 1 2.5" />
                                    <path d="m6.5 6-1 2.5" />
                                </g>
                            </svg>
                            <!-- Icono de ojo abierto (oculto por defecto) -->
                            <svg class="icon-eye-slash" xmlns="http://www.w3.org/2000/svg" fill="none"
                                viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="display: none;">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="new-password" class="form-label">Nueva contraseña</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="new-password" name="new_password" class="form-input" required
                            tabindex="6">
                        <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
                            <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke-width="1.5" stroke="currentColor">
                                <g fill="none" fill-rule="evenodd" stroke="currentColor" stroke-linecap="round"
                                    stroke-linejoin="round" transform="translate(2 10)">
                                    <path
                                        d="m0 .5c2.53705308 3.66666667 5.37038642 5.5 8.5 5.5 3.1296136 0 5.9629469-1.83333333 8.5-5.5" />
                                    <path d="m2.5 3.423-2 2.077" />
                                    <path d="m14.5 3.423 2 2.077" />
                                    <path d="m10.5 6 1 2.5" />
                                    <path d="m6.5 6-1 2.5" />
                                </g>
                            </svg>

                            <svg class="icon-eye-slash" xmlns="http://www.w3.org/2000/svg" fill="none"
                                viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="display: none;">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password" class="form-label">Confirmar nueva contraseña</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirm-password" name="confirm_password" class="form-input" required
                            tabindex="7">
                        <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
                            <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke-width="1.5" stroke="currentColor">
                                <g fill="none" fill-rule="evenodd" stroke="currentColor" stroke-linecap="round"
                                    stroke-linejoin="round" transform="translate(2 10)">
                                    <path
                                        d="m0 .5c2.53705308 3.66666667 5.37038642 5.5 8.5 5.5 3.1296136 0 5.9629469-1.83333333 8.5-5.5" />
                                    <path d="m2.5 3.423-2 2.077" />
                                    <path d="m14.5 3.423 2 2.077" />
                                    <path d="m10.5 6 1 2.5" />
                                    <path d="m6.5 6-1 2.5" />
                                </g>
                            </svg>

                            <svg class="icon-eye-slash" xmlns="http://www.w3.org/2000/svg" fill="none"
                                viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="display: none;">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </button>
                    </div>
                    {% if error %}
                    <p id="Men_error" style="color: red;" tabindex="-1">{{ error }}</p>
                    {% endif %}
                </div>

                <button type="submit" class="btn btn-secondary" tabindex="8">Cambiar Contraseña</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}


{% block scripts %}

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const togglePasswordButtons = document.querySelectorAll('.toggle-password');

        togglePasswordButtons.forEach(button => {
            button.addEventListener('click', function () {
                // Encuentra el input de contraseña que es hermano del div del botón
                const passwordInput = this.parentElement.querySelector('input');
                const iconEye = this.querySelector('.icon-eye');
                const iconEyeSlash = this.querySelector('.icon-eye-slash');

                // Cambia el tipo de input
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);

                // Cambia el icono y la etiqueta aria para accesibilidad
                if (type === 'text') {
                    iconEye.style.display = 'none';
                    iconEyeSlash.style.display = 'block';
                    this.setAttribute('aria-label', 'Ocultar contraseña');
                } else {
                    iconEye.style.display = 'block';
                    iconEyeSlash.style.display = 'none';
                    this.setAttribute('aria-label', 'Mostrar contraseña');
                }
            });

            //Hacer foco en el mensaje de error si existe
            const errorElement = document.getElementById('Men_error');
            if (errorElement) {
                errorElement.focus();
            }
        });
    });
</script>

{% endblock %}
