<div id="datos-paciente" class="tab-content active">
    <div class="formulario">
        <h2>Datos del Paciente</h2>
        <form method="POST" action="{% url 'datos_pacientes' %}" autocomplete="off">
            {% csrf_token %}
            <input type="hidden" id="paciente_id" name="paciente_id">

            <fieldset>
                <legend>Información personal</legend>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>

                <label for="apellidos">Apellidos:</label>
                <input type="text" id="apellidos" name="apellidos" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="edad">Edad:</label>
                <input type="number" id="edad" name="edad" required>
            </fieldset>

            <fieldset>
                <legend>Datos médicos</legend>
                <label for="genero">Género:</label>
                <select id="genero" name="genero" required>
                    <option value="" disabled selected hidden>- - - - -</option>
                    <option value="Hombre">Hombre</option>
                    <option value="Mujer">Mujer</option>
                    <option value="Otro">Otro</option>
                </select>

                <label for="gr_sanguineo">Grupo sanguíneo:</label>
                <select id="gr_sanguineo" name="gr_sanguineo" required>
                    <option value="" disabled selected hidden>- - - - -</option>
                    <option value="0-">0-</option>
                    <option value="0+">0+</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </fieldset>

            <fieldset>
                <legend>Identificaciones de laboratorio</legend>
                <label for="ident_muestra">Identificación paciente de muestras sangre:</label>
                <input type="text" id="ident_muestra" name="ident_muestra" required>

                <label for="ident_petri">Identificación paciente de placas petri:</label>
                <input type="text" id="ident_petri" name="ident_petri" required>
            </fieldset>

            <div class="form-buttons">
                <button type="submit" id="guardarDatos">Guardar paciente</button>
                <button type="button" id="eliminarDatos"
                    onclick="if(confirm('¿Estás seguro de que quieres eliminar este paciente?')) document.getElementById('form-borrar-paciente').submit();">Eliminar
                    paciente</button>
            </div>
        </form>

        <form id="form-borrar-paciente" method="POST" action="{% url 'borrar_paciente' %}" style="display: none;">
            {% csrf_token %}
            <input type="hidden" id="paciente_id2" name="paciente_id2">
            <div class="form-buttons">
                {# <button type="submit" id="eliminarDatos">Eliminar paciente</button> #}
            </div>
        </form>
    </div>
</div>
