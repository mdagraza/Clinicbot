<div id="datos-paciente" class="tab-content active">
    <div class="formulario">
        <h2>Datos del Paciente</h2>
        <form method="POST" action="{% url 'editar_usuario' %}" autocomplete="off">
            {% csrf_token %}
            <input type="hidden" id="usuario_id" name="usuario_id">
            
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            
            <div class="form-group">
                <label for="apellidos">Apellidos:</label>
                <input type="text" id="apellidos" name="apellidos" required>
            </div>
            
            <div class="form-group">
                <label for="ident_muestra">Identificador paciente de muestras sangre:</label>
                <input type="text" id="ident_muestra" name="ident_muestra" required>
            </div>
            
            <div class="form-group">
                <label for="ident_petri">Identificador paciente de placas petri:</label>
                <input type="text" id="ident_petri" name="ident_petri" required>
            </div>
            
            <div class="form-group">
                <label for="edad">Edad:</label>
                <input type="number" id="edad" name="edad" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="genero">Género:</label>
                <select id="genero" name="genero" required>
                    <option value="" disabled selected hidden>- - - - -</option>
                    <option value="Hombre">Hombre</option>
                    <option value="Mujer">Mujer</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="gr_sanguineo">Grupo sanguíneo:</label>
                <select id="gr_sanguineo" name="gr_sanguineo" required>
                    <option value="" disabled selected hidden>- - - - -</option>
                    <option value="0-">0-</option>
                    <option value="0+">0+</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>
            
            <div class="form-buttons">
                <button type="submit" id="guardarDatos">Guardar paciente</button>
            </div>
        </form>
        
        <form method="POST" action="{% url 'borrar_usuario' %}">
            {% csrf_token %}
            <input type="hidden" id="usuario_id2" name="usuario_id2">
            <div class="form-buttons">
                <button type="submit" id="eliminarDatos">Eliminar paciente</button>
            </div>
        </form>
    </div>
</div>
