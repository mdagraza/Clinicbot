{% extends 'layout/base1.html' %}
{% load static %}

{% block title %}Login{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'formulario/styles-login.css' %}">
{% endblock %}

{% block content %}

<form method="post">
    {% csrf_token %}
    <h1>Login</h1>
    {% if error %}
    <p id="Men_error" style="color: red;">{{ error }}</p>
    {% endif %}
    <input type="text" name="username" placeholder="user" autofocus required>
    <input type="password" name="password" placeholder="password" required>
    <button type="submit">Iniciar Sesión</button>
</form>

{% endblock %}
